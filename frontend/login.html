<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Eventify</title>
    <link rel="stylesheet" href="./css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
</head>

<body class="auth-body">

    <div class="auth-container">
        <h2>Welcome Back</h2>
        <p>Login to book and manage events</p>
        <form id="login-form">
            <div class="form-group">
                <label for="email">Email Address</label>
                <input type="email" id="email" required placeholder="Enter your email">
            </div>
            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" required placeholder="Enter your password">
            </div>
            <p id="error-message" class="error"></p>
            <button type="submit" class="btn-primary auth-btn">Login</button>
        </form>
        <div class="auth-footer">
            <p>Don't have an account? <a href="register.html">Sign Up</a></p>
            <p>Admin? <a href="admin-register.html" style="color: var(--primary-color); font-weight: 600;">Admin Portal Registration</a></p>
            <p><a href="index.html">Back to Home</a></p>
        </div>
    </div>

    <script src="./js/api.js"></script>
    <script src="./js/auth.js"></script>
</body>

</html>
